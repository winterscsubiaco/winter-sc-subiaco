<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diario – Winter SC Subiaco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#060A14">
</head>
<body>

  <!-- SITE HEADER -->
  <div class="site-header">
    <div class="status-bar">
      <div class="status-left">
        <div class="live-dot"></div>
        <span class="status-txt">SISTEMA <em>ONLINE</em><span class="status-txt-extra">&nbsp;·&nbsp;STAGIONE 2025–26</span></span>
      </div>
      <span class="status-time" id="statusTime"></span>
    </div>
    <header class="intestazione">
      <div class="header-snow">
        <span class="sf sf1">❄</span><span class="sf sf2">❄</span>
        <span class="sf sf3">❄</span><span class="sf sf4">❄</span>
        <span class="sf sf5">❄</span><span class="sf sf6">❄</span>
      </div>
      <div class="intestazione-sx">
        <div class="logo-hex"><img class="lh-icon" src="icon-192.png" alt="WSC"></div>
        <div class="header-txt-wrap">
          <h1 class="header-title">WINTER SC<br>SUBIACO</h1>
          <div class="header-sub">▸ TRAINING DIARY v2.6</div>
        </div>
      </div>
      <div class="header-dx">
        <div class="user-info-tag">
          <span class="user-role-lbl">ATLETA</span>
          <strong class="user-name-val" id="nomeUtente">...</strong>
        </div>
        <button class="btn-logout" id="btnEsci">Esci</button>
      </div>
    </header>
  </div>

  <main class="contenuto">

    <!-- AVVISI ALLENATRICE -->
    <div id="sezioneAvvisi"></div>

    <!-- SELETTORE SETTIMANA -->
    <div class="selettore-settimana">
      <div class="campo">
        <label>Visualizza / Crea</label>
        <select id="diarioSelect"></select>
      </div>
      <div class="campo">
        <label>N° Settimana</label>
        <input type="number" id="settimana_n" min="1" max="60" placeholder="Es. 1">
      </div>
      <div class="campo">
        <label>Dal</label>
        <input type="date" id="data_dal">
      </div>
      <div class="campo">
        <label>Al</label>
        <input type="date" id="data_al">
      </div>
    </div>

    <!-- TABELLA ALLENAMENTO -->
    <div class="scheda">
      <div class="scheda-titolo">DIARIO DI ALLENAMENTO SETTIMANALE</div>

      <div class="tabella-wrapper">
        <table class="tabella">
          <thead>
            <tr>
              <th class="col-giorno">Giorno</th>
              <th class="col-sub"></th>
              <th class="col-att">Forza</th>
              <th class="col-att">Pattini</th>
              <th class="col-att">Marcia</th>
              <th class="col-att">Bici</th>
              <th class="col-att">Corsa</th>
              <th class="col-att">Skiroll<br>CL</th>
              <th class="col-att">Skiroll<br>SK</th>
              <th class="col-att">Sci<br>CL</th>
              <th class="col-att">Sci<br>SK</th>
              <th class="col-int">I1</th>
              <th class="col-int">I2</th>
              <th class="col-int">I3</th>
              <th class="col-int">I4</th>
              <th class="col-int">I5</th>
              <th class="col-tot">Tot.<br>Sett.</th>
              <th class="col-tot">Tot.<br>Prog.</th>
            </tr>
          </thead>
          <tbody id="corpoTabella">
            <!-- Generato da JS -->
          </tbody>
          <tfoot id="pieTabella">
            <!-- Generato da JS -->
          </tfoot>
        </table>
      </div>

      <!-- AREA SALVA -->
      <div class="area-salva">
        <div id="msgSalva" class="nascosto"></div>
        <button class="btn btn-pieno" id="btnSalva">💾 Salva Diario</button>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/diario.js"></script>
  <script>
    (function() {
      function aggiornaStatusTime() {
        const now = new Date();
        const start = new Date('2025-10-06');
        const wk = Math.max(1, Math.ceil((now - start) / (7*24*60*60*1000)));
        const gg = ['DOM','LUN','MAR','MER','GIO','VEN','SAB'];
        const mm = ['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC'];
        const el = document.getElementById('statusTime');
        if (el) el.textContent = 'WK·' + String(wk).padStart(2,'0') + ' · ' + gg[now.getDay()] + ' ' + String(now.getDate()).padStart(2,'0') + '/' + mm[now.getMonth()];
      }
      aggiornaStatusTime();
      setInterval(aggiornaStatusTime, 60000);
    })();
  </script>
</body>
</html>
